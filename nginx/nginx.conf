events {
    worker_connections 512;
}

http {
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name skydev.ddns.net;

        ssl_certificate /etc/letsencrypt/live/skydev.ddns.net/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/skydev.ddns.net/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        location = /metric {
            return 301 /metric/;
        }

        location /metric/ {
            proxy_pass http://grafana:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /redstone {
            return 301 /redstone/;
        }

        location /redstone/ {
            proxy_pass http://host.docker.internal:444/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
