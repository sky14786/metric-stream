events {
    worker_connections 512;
}

http {
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name skydev.ddns.net;

        ssl_certificate /etc/letsencrypt/live/skydev.ddns.net/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/skydev.ddns.net/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        location = /metric {
            return 301 /metric/;
        }

        location /metric/ {
            proxy_pass http://grafana:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /redstone {
            return 301 /redstone/;
        }

        location /redstone/ {
            proxy_pass https://redstone:443/;
            proxy_ssl_verify off;
            proxy_redirect / /redstone/;

            # sub_filter: rewrite absolute paths in HTML/JS responses
            proxy_set_header Accept-Encoding "";
            sub_filter_once off;
            sub_filter_types text/html text/javascript application/javascript;

            sub_filter 'href="/'   'href="/redstone/';
            sub_filter "href='/"   "href='/redstone/";
            sub_filter 'src="/'    'src="/redstone/';
            sub_filter 'action="/' 'action="/redstone/';
            sub_filter 'fetch("/'  'fetch("/redstone/';
            sub_filter "fetch('/"  "fetch('/redstone/";
            sub_filter '`/api/'   '`/redstone/api/';
            sub_filter "location.href='/"                         "location.href='/redstone/";
            sub_filter 'window.location.href = "/'                'window.location.href = "/redstone/';
            sub_filter "window.location.href = '/"                "window.location.href = '/redstone/";
            sub_filter 'window.location.replace("/'               'window.location.replace("/redstone/';
            sub_filter "window.location.replace('/"               "window.location.replace('/redstone/";
            sub_filter 'window.history.pushState(null, "", "/'    'window.history.pushState(null, "", "/redstone/';

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
