services:
  kafka:
    image: apache/kafka:3.9.0
    container_name: metric-kafka
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_HEAP_OPTS: "-Xmx256m -Xms128m"
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - metric-net
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/localhost/9092'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512m
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: metric-postgres
    ports:
      - "6432:5432"
    environment:
      POSTGRES_DB: metricdb
      POSTGRES_USER: metric
      POSTGRES_PASSWORD: metric1234
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - metric-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metric -d metricdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 384m
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.0
    container_name: metric-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_NAME=Main Org.
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_SERVER_ROOT_URL=https://skydev.ddns.net/metric
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      - ./provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - metric-net
    deploy:
      resources:
        limits:
          memory: 384m
    restart: unless-stopped

  # --- production 프로필: GCP 배포 시에만 기동 ---
  # 로컬 개발: docker compose up -d
  # GCP 배포:  docker compose --profile production up -d

  generator:
    profiles: [production]
    build:
      context: .
      dockerfile: Dockerfile.generator
    container_name: metric-generator
    environment:
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - metric-net
    deploy:
      resources:
        limits:
          memory: 512m
    restart: unless-stopped

  consumer:
    profiles: [production]
    build:
      context: .
      dockerfile: Dockerfile.consumer
    container_name: metric-consumer
    environment:
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/metricdb
      - SPRING_DATASOURCE_USERNAME=metric
      - SPRING_DATASOURCE_PASSWORD=metric1234
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - metric-net
    deploy:
      resources:
        limits:
          memory: 512m
    restart: unless-stopped

  nginx:
    profiles: [production]
    image: nginx:alpine
    container_name: metric-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - grafana
    networks:
      - metric-net
    deploy:
      resources:
        limits:
          memory: 32m
    restart: unless-stopped

networks:
  metric-net:
    driver: bridge

volumes:
  kafka-data:
  postgres-data:
  grafana-data:
